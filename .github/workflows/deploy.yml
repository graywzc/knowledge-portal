name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Mac mini M4
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20

    steps:
      - name: Resolve deploy SHA
        id: resolve_sha
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update code
        shell: bash
        run: |
          set -euo pipefail
          cd /opt/knowledge-portal/current
          git fetch origin --prune
          git checkout -f "${{ steps.resolve_sha.outputs.sha }}"

      - name: Install dependencies & test
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/opt/node/bin:$PATH"
          echo "node: $(node -v)  npm: $(npm -v)"
          cd /opt/knowledge-portal/current
          npm ci
          npm test

      - name: Restart services
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/opt/node/bin:/opt/homebrew/bin:$PATH"
          APP_DIR="/opt/knowledge-portal/current"
          SHARED_ENV="/opt/knowledge-portal/shared/.env"
          pm2 restart knowledge-portal-app knowledge-portal-ingest || (
            ENV_FILE="$SHARED_ENV" pm2 start "npm run app:start"    --name knowledge-portal-app    --cwd "$APP_DIR"
            ENV_FILE="$SHARED_ENV" pm2 start "npm run mtproto:loop" --name knowledge-portal-ingest --cwd "$APP_DIR"
            pm2 save
          )
