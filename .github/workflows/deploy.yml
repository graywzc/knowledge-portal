name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Mac mini
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve deploy SHA
        id: resolve_sha
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-deploy-knowledge-portal

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" << 'EOF'
            set -euo pipefail

            BASE_DIR="/opt/knowledge-portal"
            APP_DIR="$BASE_DIR/current"
            SHARED_ENV="$BASE_DIR/shared/.env"
            REPO="git@github.com:graywzc/knowledge-portal.git"

            mkdir -p "$BASE_DIR/shared" "$BASE_DIR/data" "$BASE_DIR/media"

            if [ ! -f "$SHARED_ENV" ]; then
              echo "Missing env file: $SHARED_ENV"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin --prune
            git checkout -f "$DEPLOY_SHA"

            npm ci
            npm test

            pm2 delete knowledge-portal-app >/dev/null 2>&1 || true
            pm2 delete knowledge-portal-ingest >/dev/null 2>&1 || true

            ENV_FILE="$SHARED_ENV" pm2 start "npm run app:start" --name knowledge-portal-app --cwd "$APP_DIR"
            ENV_FILE="$SHARED_ENV" pm2 start "npm run mtproto:loop" --name knowledge-portal-ingest --cwd "$APP_DIR"
            pm2 save
          EOF
