<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f5f5f5; color: #111; }

    body.dark { background: #0f1115; color: #e8eaed; }

    #sidebar { width: 280px; background: #1a1a2e; color: #eee; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    #sidebar h2 { font-size: 14px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    #sidebar select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 13px; }
    .sidebar-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .sidebar-mini-btn { border: 1px solid #3a4f80; background: #22345a; color: #d7e6ff; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
    .sidebar-mini-btn:hover { background: #2a4373; }

    .tree-node { padding: 6px 8px; cursor: pointer; border-radius: 4px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .tree-node:hover { background: rgba(255,255,255,0.1); }
    .tree-node.active { background: rgba(100,140,255,0.3); }
    .tree-toggle { width: 16px; text-align: center; font-weight: 700; opacity: 0.9; cursor: pointer; user-select: none; }
    .tree-toggle.placeholder { visibility: hidden; }
    .tree-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-children { margin-left: 16px; border-left: 1px solid #333; }

    #main { flex: 1; display: flex; flex-direction: column; }
    #layer-header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #ddd; font-weight: 600; }
    #layer-header .back-link { display: inline-block; margin-left: 10px; font-weight: 500; font-size: 12px; color: #4a6cf7; cursor: pointer; text-decoration: none; }
    #layer-header .back-link:hover { text-decoration: underline; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; }
    .msg { max-width: 760px; margin-bottom: 12px; padding: 10px 14px 22px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; position: relative; }
    .msg p { margin: 0 0 8px 0; }
    .msg p:last-child { margin-bottom: 0; }
    .msg pre { background: #0b1220; color: #dbe7ff; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .msg code { background: rgba(74,108,247,0.12); padding: 1px 5px; border-radius: 5px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .msg pre code { background: transparent; padding: 0; border-radius: 0; font-size: 12px; }
    .msg .code-card { border: 1px solid #cfd6e6; border-radius: 8px; overflow: hidden; margin: 8px 0; }
    .msg .code-header { display: flex; justify-content: space-between; align-items: center; background: #d9ecff; color: #2d4f73; padding: 4px 8px; font-size: 12px; }
    .msg .code-header .lang { font-weight: 600; text-transform: lowercase; }
    .msg .code-header .copy-btn { border: none; background: transparent; cursor: pointer; color: inherit; font-size: 12px; }
    .msg .code-card pre { margin: 0; border-radius: 0; }
    .msg table { width: 100%; border-collapse: collapse; margin: 8px 0; display: block; overflow-x: auto; }
    .msg th, .msg td { border: 1px solid #d7dbe5; padding: 6px 8px; text-align: left; white-space: nowrap; }
    .msg th { background: #eef2ff; }
    .msg blockquote { border-left: 3px solid #94a3b8; padding-left: 10px; margin: 8px 0; color: #4b5563; }
    .msg ul, .msg ol { padding-left: 20px; margin: 8px 0; }
    .msg .media-image { display: block; width: 100%; max-width: 520px; border-radius: 10px; border: 1px solid #cfd6e6; margin: 6px 0 8px; background: #e9eef7; }
    .msg .media-caption { margin-top: 2px; }
    .msg.self { background: #d1e7ff; margin-left: auto; }
    .msg.other, .msg.bot { background: #fff; border: 1px solid #ddd; }
    .msg .meta { font-size: 11px; color: #888; margin-top: 4px; }
    .msg .time { position: absolute; right: 10px; bottom: 6px; font-size: 11px; color: #7a7a7a; }
    .msg .chat-id { position: absolute; left: 10px; bottom: 6px; font-size: 11px; color: #7a7a7a; opacity: 0.9; }

    body.dark #layer-header { background: #161a22; border-bottom-color: #2a2f3a; color: #e8eaed; }
    body.dark #layer-header .back-link { color: #8fb0ff; }
    body.dark #messages { background: #0f1115; }
    body.dark .msg.self { background: #214a73; color: #e8eaed; }
    body.dark .msg.other, body.dark .msg.bot { background: #1a1f29; border-color: #2f3644; color: #e8eaed; }
    body.dark .msg .meta { color: #a0a7b4; }
    body.dark .msg .time { color: #9aa4b2; }
    body.dark .msg .chat-id { color: #9aa4b2; }
    body.dark .msg code { background: rgba(143,176,255,0.18); }
    body.dark .msg table { color: #e8eaed; }
    body.dark .msg th, body.dark .msg td { border-color: #3a4458; }
    body.dark .msg th { background: #20283a; }
    body.dark .msg blockquote { color: #b8c2d4; border-left-color: #64748b; }
    body.dark .msg .code-card { border-color: #2f3a52; }
    body.dark .msg .code-header { background: #29425f; color: #d8e8ff; }
    body.dark .msg .media-image { border-color: #2f3a52; background: #1a2435; }
    .msg .branch-badge { display: inline-block; background: #4a6cf7; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; cursor: pointer; }

    #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 16px; }

    #composer { border-top: 1px solid #ddd; background: #fff; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
    #composer.hidden { display: none; }
    #reply-banner { display: none; font-size: 12px; color: #2d4f73; background: #e9f2ff; border: 1px solid #c8dcff; border-radius: 8px; padding: 6px 10px; }
    #reply-banner .close { float: right; cursor: pointer; font-weight: 700; }
    #composer-row { display: flex; gap: 8px; align-items: center; }
    #composer-input { flex: 1; padding: 10px 12px; border: 1px solid #cfd6e6; border-radius: 10px; font-size: 14px; min-height: 44px; resize: vertical; }
    #composer-send { padding: 10px 14px; border: 1px solid #4a6cf7; border-radius: 10px; background: #4a6cf7; color: #fff; font-weight: 600; cursor: pointer; }
    #composer-send:disabled { opacity: 0.6; cursor: not-allowed; }

    #msg-context-menu { position: fixed; display: none; z-index: 9999; min-width: 120px; background: #fff; border: 1px solid #d8deea; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.16); padding: 4px; }
    #msg-context-menu button { width: 100%; border: none; background: transparent; text-align: left; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #msg-context-menu button:hover { background: #edf2ff; }

    body.dark #composer { background: #161a22; border-top-color: #2a2f3a; }
    body.dark #reply-banner { color: #d7e6ff; background: #243753; border-color: #345179; }
    body.dark #composer-input { background: #0f1115; color: #e8eaed; border-color: #2f3644; }
    body.dark #msg-context-menu { background: #1a1f29; border-color: #2f3644; }
    body.dark #msg-context-menu button { color: #e8eaed; }
    body.dark #msg-context-menu button:hover { background: #2a3344; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div>
      <h2>Source</h2>
      <select id="source-select"><option value="">Select source...</option></select>
    </div>
    <div>
      <div class="sidebar-row">
        <h2>Topics</h2>
        <button id="create-topic-btn" class="sidebar-mini-btn" type="button">+ Topic</button>
      </div>
      <select id="channel-select" style="display:none;"></select>
      <div id="topic-list" style="margin-top:8px; display:none;"></div>
    </div>
    <div>
      <h2>Layers</h2>
      <div id="tree"></div>
    </div>
  </div>
  <div id="main">
    <div id="layer-header">Knowledge Portal</div>
    <div id="messages">
      <div id="empty-state">Select a source and channel to view messages</div>
    </div>
    <div id="composer" class="hidden">
      <div id="reply-banner"></div>
      <div id="composer-row">
        <textarea id="composer-input" placeholder="Send a message to Telegram…"></textarea>
        <button id="composer-send" type="button">Send</button>
      </div>
    </div>
  </div>
  <div id="msg-context-menu">
    <button id="ctx-reply-btn" type="button">Reply</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
  <script>
    let currentSource = '';
    let currentChannel = '';
    let currentTopicName = '';
    let currentLayerId = 'A';
    let viewState = null;
    let expandedNodes = new Set(['A']);
    let isSending = false;
    let realtimeStream = null;
    let realtimeRefreshPending = false;
    let replyTarget = null;
    let contextTarget = null;
    const pendingTopics = new Map();

    const md = window.markdownit({
      html: false,
      linkify: true,
      breaks: true,
      // Keep leading "#" as literal text instead of heading promotion.
      // This is important for labels/comments like "# class_id ..." in dataset snippets.
      }).disable(['heading', 'lheading']);

    md.set({
      highlight: (str, lang) => {
        try {
          if (lang && window.hljs && hljs.getLanguage(lang)) {
            return `<pre><code class="hljs language-${lang}">${hljs.highlight(str, { language: lang }).value}</code></pre>`;
          }
          if (window.hljs) {
            return `<pre><code class="hljs">${hljs.highlightAuto(str).value}</code></pre>`;
          }
        } catch (_) {}
        return `<pre><code>${escapeHtml(str)}</code></pre>`;
      },
    });

    function applyThemeByTime() {
      const h = new Date().getHours();
      const dark = (h >= 19 || h < 7);
      document.body.classList.toggle('dark', dark);
    }

    function formatMessageTime(ts) {
      const d = new Date(Number(ts));
      const now = new Date();
      const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (sameDay) return time;
      const date = d.toLocaleDateString([], { month: 'numeric', day: 'numeric', year: '2-digit' });
      return `${date} ${time}`;
    }

    const appBasePath = (() => {
      const p = (window.location.pathname || '').replace(/\/+$/, '');
      return (!p || p === '/') ? '' : p;
    })();

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${appBasePath}/api${path}`, opts);
      return res.json();
    }

    function updateComposerVisibility() {
      const composer = document.getElementById('composer');
      const enabled = (currentSource === 'telegram' && !!currentChannel);
      composer.classList.toggle('hidden', !enabled);
    }

    function setReplyTarget(target) {
      replyTarget = target;
      const banner = document.getElementById('reply-banner');
      if (!replyTarget) {
        banner.style.display = 'none';
        banner.innerHTML = '';
        return;
      }
      banner.style.display = 'block';
      banner.innerHTML = `Replying to #${escapeHtml(String(getShortChatId(replyTarget.id)))} · ${escapeHtml(String(replyTarget.preview || ''))}<span class="close" id="reply-cancel">×</span>`;
      const cancel = document.getElementById('reply-cancel');
      if (cancel) cancel.onclick = () => setReplyTarget(null);
    }

    function openContextMenu(x, y, msgInfo) {
      contextTarget = msgInfo;
      const menu = document.getElementById('msg-context-menu');
      menu.style.display = 'block';
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
    }

    function closeContextMenu() {
      const menu = document.getElementById('msg-context-menu');
      menu.style.display = 'none';
      contextTarget = null;
    }

    async function refreshCurrentView() {
      if (realtimeRefreshPending) return;
      if (!currentSource || !currentChannel) return;
      realtimeRefreshPending = true;
      try {
        await loadView(currentSource, currentChannel);
      } catch (_) {
      } finally {
        realtimeRefreshPending = false;
      }
    }

    function stopRealtimeStream() {
      if (realtimeStream) {
        realtimeStream.close();
        realtimeStream = null;
      }
    }

    function startRealtimeStream() {
      stopRealtimeStream();
      if (!currentSource || !currentChannel) return;
      if (!window.EventSource) return;

      const url = `${appBasePath}/api/stream?source=${encodeURIComponent(currentSource)}&channel=${encodeURIComponent(currentChannel)}`;
      realtimeStream = new EventSource(url);
      realtimeStream.addEventListener('update', () => {
        if (document.hidden) return;
        refreshCurrentView();
      });
      realtimeStream.onerror = () => {
        // EventSource will auto-reconnect; keep handler to avoid uncaught noise.
      };
    }

    function getSelectedLayerAnchorReplyId() {
      const layer = viewState?.state?.layers?.[currentLayerId];
      if (!layer || !Array.isArray(layer.messages)) return Number(currentChannel);

      // Prefer replying to latest self message in the selected layer so replay
      // deterministically resolves back to this same layer.
      for (let i = layer.messages.length - 1; i >= 0; i--) {
        const m = layer.messages[i];
        if (m?.sender !== 'self') continue;
        const n = Number(getShortChatId(m.id));
        if (Number.isFinite(n)) return n;
      }

      // Fallback: topic anchor keeps the send in this forum topic.
      return Number(currentChannel);
    }

    async function sendCurrentMessage() {
      if (isSending) return;
      if (currentSource !== 'telegram' || !currentChannel) return;

      const input = document.getElementById('composer-input');
      const btn = document.getElementById('composer-send');
      const text = String(input.value || '').trim();
      if (!text) return;

      isSending = true;
      btn.disabled = true;

      try {
        const result = await api('POST', '/telegram/send', {
          text,
          replyToId: replyTarget ? Number(getShortChatId(replyTarget.id)) : getSelectedLayerAnchorReplyId(),
        });
        if (result && result.error) throw new Error(result.error);
        input.value = '';
        setReplyTarget(null);
        await loadView(currentSource, currentChannel);
      } catch (e) {
        alert('Send failed. Please try again.');
      } finally {
        isSending = false;
        btn.disabled = false;
      }
    }

    async function loadSources() {
      const sources = await api('GET', '/sources');
      const sel = document.getElementById('source-select');
      sel.innerHTML = '<option value="">Select source...</option>';
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });

      if (sources.includes('telegram')) {
        currentSource = 'telegram';
        sel.value = 'telegram';
        await loadChannels('telegram');
      }
    }

    async function createTopicFromUI() {
      if (currentSource !== 'telegram') return;
      const title = window.prompt('New topic title');
      if (title === null) return;
      const trimmed = String(title).trim();
      if (!trimmed) return;

      const result = await api('POST', '/telegram/topics/create', { title: trimmed });
      if (result?.error) {
        alert(`Create topic failed: ${result.error}`);
        return;
      }

      if (result?.topicId) {
        pendingTopics.set(String(result.topicId), { name: trimmed });
      }

      await loadChannels('telegram');
      if (result?.topicId) {
        currentChannel = String(result.topicId);
        currentTopicName = trimmed;
        updateComposerVisibility();
        await loadView(currentSource, currentChannel);
        startRealtimeStream();
      }
    }

    async function loadChannels(source) {
      const topicList = document.getElementById('topic-list');
      const sel = document.getElementById('channel-select');
      topicList.style.display = 'block';
      topicList.innerHTML = '';
      sel.innerHTML = '';

      if (source === 'telegram') {
        const fetched = await api('GET', '/telegram/topics');
        const topics = Array.isArray(fetched) ? [...fetched] : [];

        // Merge locally-created topics that may not be ingested yet.
        for (const [id, t] of pendingTopics.entries()) {
          if (!topics.some(x => String(x.id) === String(id))) {
            topics.unshift({ id: String(id), name: t.name, messageCount: 0, lastTimestamp: Date.now() });
          } else {
            pendingTopics.delete(String(id));
          }
        }

        topics.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.name || t.id;
          sel.appendChild(opt);

          const row = document.createElement('div');
          row.className = 'tree-node';
          row.textContent = `${t.name} (${t.messageCount})`;
          row.onclick = async () => {
            currentChannel = t.id;
            currentTopicName = t.name || '';
            sel.value = t.id;
            updateComposerVisibility();
            await loadView(currentSource, currentChannel);
            startRealtimeStream();
          };
          topicList.appendChild(row);
        });
        return;
      }

      const channels = await api('GET', `/sources/${source}/channels`);
      channels.forEach(c => {
        const value = (typeof c === 'string') ? c : c.id;
        const label = (typeof c === 'string') ? c : (c.name || c.id);

        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label;
        sel.appendChild(opt);

        const row = document.createElement('div');
        row.className = 'tree-node';
        row.textContent = label;
        row.onclick = async () => {
          currentChannel = value;
          currentTopicName = label;
          sel.value = value;
          updateComposerVisibility();
          await loadView(currentSource, currentChannel);
        };
        topicList.appendChild(row);
      });
    }

    function topicStateKey(source, channel) {
      return `kp:lastLayer:${source}:${channel}`;
    }

    function getSavedLayer(source, channel) {
      try { return localStorage.getItem(topicStateKey(source, channel)); } catch (_) { return null; }
    }

    function saveCurrentLayer(source, channel, layerId) {
      try { localStorage.setItem(topicStateKey(source, channel), layerId); } catch (_) {}
    }

    function expandPathToLayer(layerId) {
      let cur = layerId;
      while (cur) {
        expandedNodes.add(cur);
        const p = viewState?.state?.layers?.[cur]?.parentLayerId || null;
        cur = p;
      }
      expandedNodes.add('A');
    }

    async function loadView(source, channel) {
      viewState = await api('GET', `/sources/${encodeURIComponent(source)}/channels/${encodeURIComponent(channel)}/view`);
      const saved = getSavedLayer(source, channel);
      const exists = saved && viewState?.state?.layers?.[saved];
      currentLayerId = exists ? saved : viewState.currentLayerId;
      expandPathToLayer(currentLayerId);
      renderTree(viewState.tree);
      showLayer(currentLayerId);
      updateComposerVisibility();
    }

    function layerTitle(layerId) {
      if (layerId === 'A' && currentTopicName) return currentTopicName;
      const layer = viewState?.state?.layers?.[layerId];
      if (!layer || !layer.messages || layer.messages.length === 0) return `Layer ${layerId}`;
      const first = (layer.messages[0].content || '').replace(/\s+/g, ' ').trim();
      return first ? (first.length > 42 ? first.slice(0, 42) + '…' : first) : `Layer ${layerId}`;
    }

    function renderTree(node, container) {
      if (!container) {
        container = document.getElementById('tree');
        container.innerHTML = '';
      }
      if (!node) return;

      const hasChildren = !!(node.children && node.children.length);
      const isExpanded = expandedNodes.has(node.id);

      const div = document.createElement('div');
      div.className = 'tree-node' + (node.id === currentLayerId ? ' active' : '');
      div.title = `${layerTitle(node.id)} (${node.messageCount} msgs)`;

      const toggle = document.createElement('span');
      toggle.className = hasChildren ? 'tree-toggle' : 'tree-toggle placeholder';
      toggle.textContent = hasChildren ? (isExpanded ? '−' : '+') : '·';
      if (hasChildren) {
        toggle.onclick = (e) => {
          e.stopPropagation();
          if (expandedNodes.has(node.id)) expandedNodes.delete(node.id);
          else expandedNodes.add(node.id);
          renderTree(viewState.tree);
        };
      }

      const label = document.createElement('span');
      label.className = 'tree-label';
      label.textContent = layerTitle(node.id);

      div.appendChild(toggle);
      div.appendChild(label);
      div.onclick = (e) => { e.stopPropagation(); showLayer(node.id); };
      container.appendChild(div);

      if (hasChildren && isExpanded) {
        const childContainer = document.createElement('div');
        childContainer.className = 'tree-children';
        node.children.forEach(c => renderTree(c, childContainer));
        container.appendChild(childContainer);
      }
    }

    function mediaUrlFromPath(mediaPath) {
      const p = String(mediaPath || '').replace(/^\/+/, '');
      return p ? `${appBasePath}/media/${encodeURI(p)}` : null;
    }

    function showLayer(layerId, focusMessageId = null) {
      if (!viewState) return;
      currentLayerId = layerId;
      expandPathToLayer(layerId);
      saveCurrentLayer(currentSource, currentChannel, layerId);
      const layers = viewState.state.layers;
      const layer = layers[layerId];
      if (!layer) return;

      const header = document.getElementById('layer-header');
      const title = layerTitle(layerId);
      if (layer.parentLayerId && layer.branchFromMessageId) {
        header.innerHTML = `${escapeHtml(title)} <a class="back-link" onclick="showLayer('${layer.parentLayerId}', '${layer.branchFromMessageId}')">↩ back to parent msg #${escapeHtml(getShortChatId(layer.branchFromMessageId))}</a>`;
      } else {
        header.textContent = title;
      }

      const msgDiv = document.getElementById('messages');
      msgDiv.innerHTML = '';

      if (layer.messages.length === 0) {
        msgDiv.innerHTML = '<div id="empty-state">No messages in this layer</div>';
        return;
      }

      // Find which messages have child branches
      const branchPoints = {};
      for (const child of (layer.children || [])) {
        if (!branchPoints[child.branchFromMessageId]) branchPoints[child.branchFromMessageId] = [];
        branchPoints[child.branchFromMessageId].push(child.layerId);
      }

      layer.messages.forEach((m) => {
        const el = document.createElement('div');
        el.className = `msg ${m.sender}`;
        el.setAttribute('data-msg-id', m.id);
        el.setAttribute('data-msg-preview', String(m.content || '').replace(/\s+/g, ' ').trim().slice(0, 80));
        el.setAttribute('data-msg-sender', m.sender);
        let html = '';

        if (m.contentType === 'image' && m.mediaPath) {
          const mediaUrl = mediaUrlFromPath(m.mediaPath);
          if (mediaUrl) {
            html += `<img class="media-image" src="${escapeHtml(mediaUrl)}" alt="image ${escapeHtml(getShortChatId(m.id))}" loading="lazy" />`;
          }
          if (m.content && m.content !== '[media]') {
            html += `<div class="media-caption">${renderRichContent(m.content, m.entities)}</div>`;
          }
        } else {
          html += renderRichContent(m.content, m.entities);
        }

        html += `<div class="meta">${m.sender}`;
        if (m.replyToId) html += ` · reply to ${m.replyToId}`;
        if (branchPoints[m.id]) {
          branchPoints[m.id].forEach(childLayerId => {
            html += `<span class="branch-badge" onclick="showLayer('${childLayerId}')">→ ${childLayerId}</span>`;
          });
        }
        html += '</div>';
        html += `<div class="chat-id">id: ${escapeHtml(getShortChatId(m.id))}</div>`;
        html += `<div class="time">${formatMessageTime(m.timestamp)}</div>`;
        el.innerHTML = html;
        msgDiv.appendChild(el);
      });

      // Re-render tree to update active highlight
      if (viewState.tree) renderTree(viewState.tree);

      if (focusMessageId) {
        const target = msgDiv.querySelector(`[data-msg-id="${focusMessageId}"]`);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.outline = '2px solid #4a6cf7';
          setTimeout(() => { target.style.outline = ''; }, 1200);
        }
      } else {
        requestAnimationFrame(() => {
          msgDiv.scrollTop = msgDiv.scrollHeight;
        });
      }
    }

    function getShortChatId(messageId) {
      if (!messageId) return '';
      const s = String(messageId);
      const idx = s.lastIndexOf(':');
      return idx >= 0 ? s.slice(idx + 1) : s;
    }

    function preprocessMessageForMarkdown(text) {
      const s = String(text || '');
      if (!s.trim() || s.includes('```')) return s;

      // Preserve Telegram-style unicode/ASCII charts in a fixed-width block.
      const chartLike = /[│┤┼╭╮╯╰╲─→]/.test(s) && /\n/.test(s);
      if (chartLike) return `\n\`\`\`text\n${s}\n\`\`\``;

      // No command-line heuristics: only style sections that are explicitly marked in content.
      return s;
    }

    function detectCodeLang(codeEl) {
      const cls = codeEl.className || '';
      const m = cls.match(/language-([a-z0-9_+-]+)/i);
      if (m) return m[1].toLowerCase();
      const txt = (codeEl.textContent || '').trim();
      if (/^(\$\s*)?(npm|pnpm|yarn|node|python|pip|git|docker|kubectl|curl|wget|cd|ls)\b/im.test(txt)) return 'shell';
      return 'text';
    }

    function enhanceCodeBlocks(html) {
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      wrap.querySelectorAll('pre > code').forEach((codeEl, idx) => {
        const pre = codeEl.parentElement;
        const lang = detectCodeLang(codeEl);
        const card = document.createElement('div');
        card.className = 'code-card';

        const header = document.createElement('div');
        header.className = 'code-header';
        header.innerHTML = `<span class="lang">${escapeHtml(lang)}</span><button class="copy-btn" data-copy-id="cb-${idx}">⧉</button>`;

        codeEl.setAttribute('data-copy-src', `cb-${idx}`);
        pre.parentNode.insertBefore(card, pre);
        card.appendChild(header);
        card.appendChild(pre);
      });
      return wrap.innerHTML;
    }

    function renderFromEntities(text, entities) {
      const s = String(text || '');
      const ents = (Array.isArray(entities) ? entities : [])
        .filter(e => Number.isFinite(e?.offset) && Number.isFinite(e?.length) && e.length > 0)
        .sort((a, b) => a.offset - b.offset);
      if (!ents.length) return null;

      const pieces = [];
      let i = 0;

      for (const e of ents) {
        const start = Math.max(0, Math.min(s.length, e.offset));
        const end = Math.max(start, Math.min(s.length, e.offset + e.length));
        if (start > i) pieces.push(escapeHtml(s.slice(i, start)));
        const chunk = s.slice(start, end);
        if (/MessageEntityPre$/.test(e.type || '')) {
          const lang = String(e.language || 'text').toLowerCase();
          pieces.push(`\n\n\`\`\`${lang}\n${chunk}\n\`\`\`\n\n`);
        } else {
          pieces.push(escapeHtml(chunk));
        }
        i = Math.max(i, end);
      }
      if (i < s.length) pieces.push(escapeHtml(s.slice(i)));

      // We introduced markdown fences for PRE ranges, so run through markdown renderer after reassembly.
      const merged = pieces.join('');
      const raw = md.render(merged);
      return enhanceCodeBlocks(DOMPurify.sanitize(raw));
    }

    function renderRichContent(text, entities = null) {
      try {
        const fromEntities = renderFromEntities(text, entities);
        if (fromEntities) return fromEntities;

        const pre = preprocessMessageForMarkdown(text);
        const raw = md.render(pre);
        const safe = DOMPurify.sanitize(raw);
        return enhanceCodeBlocks(safe);
      } catch (_) {
        return escapeHtml(String(text || ''));
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('messages').addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) {
        closeContextMenu();
        return;
      }
      const id = btn.getAttribute('data-copy-id');
      const src = document.querySelector(`code[data-copy-src="${id}"]`);
      if (!src) return;
      try {
        await navigator.clipboard.writeText(src.textContent || '');
        const old = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = old; }, 900);
      } catch (_) {}
    });

    document.getElementById('messages').addEventListener('contextmenu', (e) => {
      const msg = e.target.closest('.msg');
      if (!msg) return;
      e.preventDefault();
      const info = {
        id: msg.getAttribute('data-msg-id'),
        preview: msg.getAttribute('data-msg-preview') || '',
        sender: msg.getAttribute('data-msg-sender') || '',
      };
      openContextMenu(e.clientX, e.clientY, info);
    });

    document.getElementById('ctx-reply-btn').onclick = () => {
      if (contextTarget) setReplyTarget(contextTarget);
      closeContextMenu();
    };

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#msg-context-menu')) closeContextMenu();
    });

    document.getElementById('source-select').onchange = async (e) => {
      currentSource = e.target.value;
      currentChannel = '';
      currentTopicName = '';
      updateComposerVisibility();
      stopRealtimeStream();
      if (currentSource) await loadChannels(currentSource);
    };

    document.getElementById('channel-select').onchange = async (e) => {
      currentChannel = e.target.value;
      const opt = e.target.selectedOptions && e.target.selectedOptions[0];
      currentTopicName = opt ? opt.textContent : '';
      updateComposerVisibility();
      if (currentSource && currentChannel) {
        await loadView(currentSource, currentChannel);
        if (currentSource === 'telegram') startRealtimeStream();
      } else {
        stopRealtimeStream();
      }
    };

    document.getElementById('create-topic-btn').onclick = () => {
      createTopicFromUI().catch(() => {
        alert('Create topic failed. Please try again.');
      });
    };

    document.getElementById('composer-send').onclick = sendCurrentMessage;
    document.getElementById('composer-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendCurrentMessage();
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      refreshCurrentView();
    });

    window.addEventListener('beforeunload', () => {
      stopRealtimeStream();
    });

    applyThemeByTime();
    setInterval(applyThemeByTime, 60 * 1000);
    updateComposerVisibility();
    loadSources();
  </script>
</body>
</html>
