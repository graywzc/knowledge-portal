<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f5f5f5; color: #111; }

    body.dark { background: #0f1115; color: #e8eaed; }
    body.resizing { cursor: col-resize; user-select: none; }

    #sidebar { width: 280px; min-width: 180px; max-width: none; background: #1a1a2e; color: #eee; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    #sidebar h2 { font-size: 14px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    #sidebar select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 13px; }
    .sidebar-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .topics-tabs { display: inline-flex; gap: 8px; align-items: baseline; }
    .topics-tab { font-size: 12px; color: #6b7280; cursor: pointer; user-select: none; }
    .topics-tab.active { color: #4a6cf7; font-weight: 700; }
    .sidebar-mini-btn { border: 1px solid #3a4f80; background: #22345a; color: #d7e6ff; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
    .sidebar-mini-btn:hover { background: #2a4373; }

    .tree-node { padding: 6px 8px; cursor: pointer; border-radius: 4px; font-size: 14px; display: flex; align-items: flex-start; gap: 6px; }
    .topic-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .wip-dots { display: inline-flex; align-items: center; gap: 2px; min-width: 14px; }
    .wip-dots.hidden { visibility: hidden; }
    .wip-dots i { width: 5px; height: 5px; border-radius: 999px; background: #6fb2ff; opacity: 0.35; animation: wipPulse 1s infinite; }
    .wip-dots i:nth-child(2) { animation-delay: 0.18s; }
    .wip-dots i:nth-child(3) { animation-delay: 0.36s; }
    @keyframes wipPulse {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-1px); }
    }
    .tree-node:hover { background: rgba(255,255,255,0.1); }
    .tree-node.active { background: rgba(100,140,255,0.3); }
    .tree-toggle { width: 16px; text-align: center; font-weight: 700; opacity: 0.9; cursor: pointer; user-select: none; }
    .tree-toggle.placeholder { visibility: hidden; }
    .tree-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-label.layer-done { text-decoration: line-through; opacity: 0.72; }
    .tree-children { margin-left: 16px; border-left: 1px solid #333; }

    #pane-splitter { width: 6px; cursor: col-resize; background: transparent; position: relative; }
    #pane-splitter::after { content: ''; position: absolute; left: 2px; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.08); }
    #pane-splitter:hover::after, body.resizing #pane-splitter::after { background: rgba(143,176,255,0.7); }

    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #layer-header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #ddd; font-weight: 600; display: flex; flex-direction: column; gap: 10px; }
    .layer-header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-width: 0; }
    .layer-header-title { min-width: 0; flex: 1; }
    .layer-header-actions { display: flex; align-items: center; gap: 8px; }
    .header-icon-btn { border: 1px solid #cfd6e6; background: #fff; color: #243b63; border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; }
    .header-icon-btn:hover { background: #eef4ff; }
    #topic-search-panel { display: none; flex-direction: column; gap: 8px; min-width: 0; }
    #topic-search-panel.open { display: flex; }
    .topic-search-bar { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #topic-search-input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid #cfd6e6; border-radius: 8px; font-size: 13px; }
    #topic-search-count { font-size: 12px; color: #6b7280; min-width: 40px; text-align: center; }
    .topic-search-btn { border: 1px solid #cfd6e6; background: #fff; color: #243b63; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .topic-search-btn:hover { background: #eef4ff; }
    #topic-search-results { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
    .topic-search-result { border: 1px solid #d9e2f2; background: #fff; border-radius: 10px; padding: 8px 10px; cursor: pointer; text-align: left; }
    .topic-search-result:hover { background: #f5f8ff; border-color: #c5d6ff; }
    .topic-search-result.active { background: #e9f1ff; border-color: #8fb0ff; }
    .topic-search-result-snippet { font-size: 13px; line-height: 1.35; color: #1f2937; }
    .topic-search-result-meta { margin-top: 4px; font-size: 11px; color: #6b7280; }
    .topic-search-empty { font-size: 12px; color: #6b7280; padding: 4px 2px; }
    #layer-header .back-link { display: inline-block; margin-left: 10px; font-weight: 500; font-size: 12px; color: #4a6cf7; cursor: pointer; text-decoration: none; }
    #layer-header .back-link:hover { text-decoration: underline; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; min-width: 0; }
    .msg { max-width: 760px; margin-bottom: 12px; padding: 10px 14px 22px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; position: relative; }
    .msg p { margin: 0 0 8px 0; }
    .msg p:last-child { margin-bottom: 0; }
    .msg pre { background: #0b1220; color: #dbe7ff; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .msg code { background: rgba(74,108,247,0.12); padding: 1px 5px; border-radius: 5px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .msg pre code { background: transparent; padding: 0; border-radius: 0; font-size: 12px; }
    .msg .code-card { border: 1px solid #cfd6e6; border-radius: 8px; overflow: hidden; margin: 8px 0; }
    .msg .code-header { display: flex; justify-content: space-between; align-items: center; background: #d9ecff; color: #2d4f73; padding: 4px 8px; font-size: 12px; }
    .msg .code-header .lang { font-weight: 600; text-transform: lowercase; }
    .msg .code-header .copy-btn { border: none; background: transparent; cursor: pointer; color: inherit; font-size: 12px; }
    .msg .code-card pre { margin: 0; border-radius: 0; }
    .msg table { width: 100%; border-collapse: collapse; margin: 8px 0; display: block; overflow-x: auto; }
    .msg th, .msg td { border: 1px solid #d7dbe5; padding: 6px 8px; text-align: left; white-space: nowrap; }
    .msg th { background: #eef2ff; }
    .msg blockquote { border-left: 3px solid #94a3b8; padding-left: 10px; margin: 8px 0; color: #4b5563; }
    .msg ul, .msg ol { padding-left: 20px; margin: 8px 0; }
    .msg .media-image { display: block; width: 100%; max-width: 520px; border-radius: 10px; border: 1px solid #cfd6e6; margin: 6px 0 8px; background: #e9eef7; cursor: zoom-in; }
    .msg .media-caption { margin-top: 2px; }
    #image-lightbox { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 32px; background: rgba(0, 0, 0, 0.82); z-index: 10000; }
    #image-lightbox.open { display: flex; }
    #image-lightbox-backdrop { position: absolute; inset: 0; }
    #image-lightbox-content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; max-width: min(96vw, 1400px); max-height: 96vh; }
    #image-lightbox-image { display: block; max-width: 100%; max-height: 96vh; width: auto; height: auto; border-radius: 12px; box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45); background: #111; }
    #image-lightbox-close { position: absolute; top: -14px; right: -14px; width: 36px; height: 36px; border: none; border-radius: 999px; background: rgba(20, 20, 20, 0.92); color: #fff; font-size: 24px; line-height: 1; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    #image-lightbox-close:hover { background: rgba(40, 40, 40, 0.96); }
    .msg.self { background: #d1e7ff; margin-left: auto; }
    .msg.other, .msg.bot { background: #fff; border: 1px solid #ddd; }
    .msg .meta { font-size: 11px; color: #888; margin-top: 4px; }
    .msg .time { position: absolute; right: 10px; bottom: 6px; font-size: 11px; color: #7a7a7a; }
    .msg .chat-id { position: absolute; left: 10px; bottom: 6px; font-size: 11px; color: #7a7a7a; opacity: 0.9; }

    body.dark #layer-header { background: #161a22; border-bottom-color: #2a2f3a; color: #e8eaed; }
    body.dark .header-icon-btn,
    body.dark .topic-search-btn,
    body.dark .topic-search-result { background: #1a1f29; color: #dbe7ff; border-color: #2f3644; }
    body.dark .header-icon-btn:hover,
    body.dark .topic-search-btn:hover,
    body.dark .topic-search-result:hover { background: #243047; }
    body.dark .topic-search-result.active { background: #2a3d5c; border-color: #8fb0ff; }
    body.dark #topic-search-input { background: #0f1115; color: #e8eaed; border-color: #2f3644; }
    body.dark #topic-search-count,
    body.dark .topic-search-result-meta,
    body.dark .topic-search-empty { color: #a0a7b4; }
    body.dark .topic-search-result-snippet { color: #e8eaed; }
    body.dark #layer-header .back-link { color: #8fb0ff; }
    body.dark #messages { background: #0f1115; }
    body.dark .msg.self { background: #214a73; color: #e8eaed; }
    body.dark .msg.other, body.dark .msg.bot { background: #1a1f29; border-color: #2f3644; color: #e8eaed; }
    body.dark .msg .meta { color: #a0a7b4; }
    body.dark .msg .time { color: #9aa4b2; }
    body.dark .msg .chat-id { color: #9aa4b2; }
    body.dark .msg code { background: rgba(143,176,255,0.18); }
    body.dark .msg table { color: #e8eaed; }
    body.dark .msg th, body.dark .msg td { border-color: #3a4458; }
    body.dark .msg th { background: #20283a; }
    body.dark .msg blockquote { color: #b8c2d4; border-left-color: #64748b; }
    body.dark .msg .code-card { border-color: #2f3a52; }
    body.dark .msg .code-header { background: #29425f; color: #d8e8ff; }
    body.dark .msg .media-image { border-color: #2f3a52; background: #1a2435; }
    .msg .branch-badge { display: inline-block; background: #4a6cf7; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; cursor: pointer; }

    #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 16px; }

    #composer { border-top: 1px solid #ddd; background: #fff; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
    #composer.hidden { display: none; }
    #reply-banner { display: none; font-size: 12px; color: #2d4f73; background: #e9f2ff; border: 1px solid #c8dcff; border-radius: 8px; padding: 6px 10px; }
    #reply-banner .close { float: right; cursor: pointer; font-weight: 700; }
    #image-preview { display: none; align-items: center; gap: 8px; }
    #image-preview img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid #cfd6e6; }
    #image-preview button { border: 1px solid #a33; background: #fff; color: #a33; border-radius: 6px; padding: 4px 8px; cursor: pointer; }
    #composer-row { display: flex; gap: 8px; align-items: center; min-width: 0; }
    #composer-input { flex: 1; min-width: 0; padding: 10px 12px; border: 1px solid #cfd6e6; border-radius: 10px; font-size: 14px; min-height: 44px; resize: none; overflow-y: hidden; }
    #composer-send { padding: 10px 14px; border: 1px solid #4a6cf7; border-radius: 10px; background: #4a6cf7; color: #fff; font-weight: 600; cursor: pointer; }
    #composer-send:disabled { opacity: 0.6; cursor: not-allowed; }

    #msg-context-menu, #topic-context-menu, #layer-context-menu { position: fixed; display: none; z-index: 9999; min-width: 120px; background: #fff; border: 1px solid #d8deea; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.16); padding: 4px; }
    #msg-context-menu button, #topic-context-menu button, #layer-context-menu button { width: 100%; border: none; background: transparent; text-align: left; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #msg-context-menu button:hover, #topic-context-menu button:hover, #layer-context-menu button:hover { background: #edf2ff; }

    body.dark #composer { background: #161a22; border-top-color: #2a2f3a; }
    body.dark #reply-banner { color: #d7e6ff; background: #243753; border-color: #345179; }
    body.dark #composer-input { background: #0f1115; color: #e8eaed; border-color: #2f3644; }
    body.dark #msg-context-menu, body.dark #topic-context-menu, body.dark #layer-context-menu { background: #1a1f29; border-color: #2f3644; }
    body.dark #msg-context-menu button, body.dark #topic-context-menu button, body.dark #layer-context-menu button { color: #e8eaed; }
    body.dark #msg-context-menu button:hover, body.dark #topic-context-menu button:hover, body.dark #layer-context-menu button:hover { background: #2a3344; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div>
      <h2>Source</h2>
      <select id="source-select"><option value="">Select source...</option></select>
    </div>
    <div>
      <div class="sidebar-row">
        <div class="topics-tabs">
          <h2 id="topics-tab-active" class="topics-tab active">TOPICS</h2>
          <h2 id="topics-tab-archived" class="topics-tab">ARCHIVES</h2>
        </div>
        <button id="create-topic-btn" class="sidebar-mini-btn" type="button">+ Topic</button>
      </div>
      <select id="channel-select" style="display:none;"></select>
      <div id="topic-list" style="margin-top:8px; display:none;"></div>
    </div>
    <div>
      <h2>Layers</h2>
      <div id="tree"></div>
    </div>
  </div>
  <div id="pane-splitter" aria-label="Resize panes" role="separator"></div>
  <div id="main">
    <div id="layer-header">
      <div class="layer-header-row">
        <div id="layer-header-title" class="layer-header-title">Knowledge Portal</div>
        <div class="layer-header-actions">
          <button id="topic-search-toggle" class="header-icon-btn" type="button" aria-label="Search topic">🔍</button>
        </div>
      </div>
      <div id="topic-search-panel">
        <div class="topic-search-bar">
          <input id="topic-search-input" type="text" placeholder="Search in topic" />
          <span id="topic-search-count">0</span>
          <button id="topic-search-prev" class="topic-search-btn" type="button">↑</button>
          <button id="topic-search-next" class="topic-search-btn" type="button">↓</button>
          <button id="topic-search-close" class="topic-search-btn" type="button">✕</button>
        </div>
        <div id="topic-search-results"></div>
      </div>
    </div>
    <div id="messages">
      <div id="empty-state">Select a source and channel to view messages</div>
    </div>
    <div id="composer" class="hidden">
      <div id="reply-banner"></div>
      <div id="image-preview">
        <img id="image-preview-img" alt="Pasted image preview" />
        <button id="image-preview-remove" type="button">Remove image</button>
      </div>
      <div id="composer-row">
        <textarea id="composer-input" placeholder="Send a message to Telegram…"></textarea>
        <button id="composer-send" type="button">Send</button>
      </div>
    </div>
  </div>
  <div id="msg-context-menu">
    <button id="ctx-reply-btn" type="button">Reply</button>
  </div>
  <div id="topic-context-menu">
    <button id="ctx-hide-topic-btn" type="button">Archive Topic</button>
    <button id="ctx-delete-topic-btn" type="button">Delete Topic</button>
  </div>
  <div id="layer-context-menu">
    <button id="ctx-toggle-layer-done-btn" type="button">Mark done</button>
  </div>
  <div id="image-lightbox" aria-hidden="true">
    <div id="image-lightbox-backdrop"></div>
    <div id="image-lightbox-content" role="dialog" aria-modal="true" aria-label="Image preview">
      <button id="image-lightbox-close" type="button" aria-label="Close image preview">×</button>
      <img id="image-lightbox-image" alt="Expanded preview" />
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
  <script>
    let currentSource = '';
    let currentChannel = '';
    let isResizingSidebar = false;
    let currentTopicName = '';
    let currentLayerUuid = '';
    let pendingImageDataUrl = null;
    let currentTopicDeletedAt = null;
    let currentTopicChatId = null;
    let topicsViewMode = 'active'; // active | archived
    let viewState = null;
    let topicSearchOpen = false;
    let topicSearchQuery = '';
    let topicSearchResults = [];
    let topicSearchIndex = -1;
    let expandedNodes = new Set();
    let isSending = false;
    let realtimeStream = null;
    let realtimeRefreshPending = false;
    let replyTarget = null;
    let contextTarget = null;
    let topicContextTarget = null;
    let layerContextTarget = null;
    let lightboxImageSrc = '';
    const pendingTopics = new Map();
    const layerWipState = new Map(); // key: `${topicId}:${layerUuid}` -> { topicId, layerUuid, startAt, untilAt }
    const layerDoneState = new Map(); // key: layerUuid -> { done, updatedAt }

    const md = window.markdownit({
      html: false,
      linkify: true,
      breaks: true,
      // Keep leading "#" as literal text instead of heading promotion.
      // This is important for labels/comments like "# class_id ..." in dataset snippets.
      }).disable(['heading', 'lheading']);

    md.set({
      highlight: (str, lang) => {
        try {
          if (lang && window.hljs && hljs.getLanguage(lang)) {
            return `<pre><code class="hljs language-${lang}">${hljs.highlight(str, { language: lang }).value}</code></pre>`;
          }
          if (window.hljs) {
            return `<pre><code class="hljs">${hljs.highlightAuto(str).value}</code></pre>`;
          }
        } catch (_) {}
        return `<pre><code>${escapeHtml(str)}</code></pre>`;
      },
    });

    function applyThemeByTime() {
      const h = new Date().getHours();
      const dark = (h >= 19 || h < 7);
      document.body.classList.toggle('dark', dark);
    }

    function formatMessageTime(ts) {
      const d = new Date(Number(ts));
      const now = new Date();
      const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (sameDay) return time;
      const date = d.toLocaleDateString([], { month: 'numeric', day: 'numeric', year: '2-digit' });
      return `${date} ${time}`;
    }

    const appBasePath = (() => {
      const p = (window.location.pathname || '').replace(/\/+$/, '');
      return (!p || p === '/') ? '' : p;
    })();

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${appBasePath}/api${path}`, opts);
      return res.json();
    }

    function applySidebarWidth(px) {
      const min = 180;
      const max = window.innerWidth - 10;
      const width = Math.max(min, Math.min(Number(px) || 280, max));
      document.getElementById('sidebar').style.width = `${width}px`;
      try { localStorage.setItem('kp:sidebarWidth', String(width)); } catch (_) {}
    }

    function restoreSidebarWidth() {
      try {
        const saved = Number(localStorage.getItem('kp:sidebarWidth') || '');
        if (Number.isFinite(saved) && saved > 0) applySidebarWidth(saved);
      } catch (_) {}
    }

    function updateComposerVisibility() {
      const composer = document.getElementById('composer');
      const enabled = (currentSource === 'telegram' && !!currentChannel && !currentTopicDeletedAt);
      composer.classList.toggle('hidden', !enabled);
    }

    function formatSearchTimestamp(ts) {
      if (!ts) return '';
      return formatMessageTime(ts);
    }

    function resetTopicSearch() {
      topicSearchQuery = '';
      topicSearchResults = [];
      topicSearchIndex = -1;
      const input = document.getElementById('topic-search-input');
      if (input) input.value = '';
      renderTopicSearchResults();
      updateTopicSearchCount();
    }

    function syncTopicSearchInput() {
      const input = document.getElementById('topic-search-input');
      if (input) input.value = topicSearchQuery || '';
    }

    function updateTopicSearchCount() {
      const count = document.getElementById('topic-search-count');
      if (!count) return;
      if (!topicSearchQuery) {
        count.textContent = '0';
        return;
      }
      count.textContent = topicSearchResults.length ? `${topicSearchIndex + 1}/${topicSearchResults.length}` : '0';
    }

    function renderTopicSearchResults() {
      const container = document.getElementById('topic-search-results');
      if (!container) return;
      container.innerHTML = '';

      if (!topicSearchQuery) return;

      if (!topicSearchResults.length) {
        const empty = document.createElement('div');
        empty.className = 'topic-search-empty';
        empty.textContent = 'No matches in this topic';
        container.appendChild(empty);
        return;
      }

      topicSearchResults.forEach((result, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'topic-search-result' + (index === topicSearchIndex ? ' active' : '');

        const snippet = document.createElement('div');
        snippet.className = 'topic-search-result-snippet';
        snippet.textContent = result.snippet || '(no snippet)';

        const meta = document.createElement('div');
        meta.className = 'topic-search-result-meta';
        meta.textContent = `#${result?.locator?.messageId || ''} · ${formatSearchTimestamp(result.timestamp)}`;

        btn.appendChild(snippet);
        btn.appendChild(meta);
        btn.onclick = () => navigateTopicSearchResult(index);
        container.appendChild(btn);
      });
    }

    function setTopicSearchOpen(open) {
      topicSearchOpen = !!open;
      const panel = document.getElementById('topic-search-panel');
      if (panel) panel.classList.toggle('open', topicSearchOpen);
      if (topicSearchOpen) {
        syncTopicSearchInput();
        renderTopicSearchResults();
        updateTopicSearchCount();
      }
    }

    async function runTopicSearch(query, { navigate = true } = {}) {
      topicSearchQuery = String(query || '').trim();
      if (!topicSearchQuery) {
        topicSearchResults = [];
        topicSearchIndex = -1;
        renderTopicSearchResults();
        updateTopicSearchCount();
        return;
      }
      if (currentSource !== 'telegram' || !currentChannel || !currentTopicChatId) {
        topicSearchResults = [];
        topicSearchIndex = -1;
        renderTopicSearchResults();
        updateTopicSearchCount();
        return;
      }

      const result = await api('POST', '/search/messages', {
        source: currentSource,
        query: topicSearchQuery,
        scope: {
          chatId: currentTopicChatId,
          topicId: currentChannel,
        },
      });

      topicSearchResults = Array.isArray(result?.results) ? result.results : [];
      topicSearchIndex = topicSearchResults.length ? 0 : -1;
      renderTopicSearchResults();
      updateTopicSearchCount();
      if (navigate && topicSearchIndex >= 0) {
        navigateTopicSearchResult(topicSearchIndex);
      }
    }

    function findLayerUuidForMessageId(messageId) {
      const target = String(messageId || '');
      const layers = viewState?.state?.layers || {};
      for (const [layerUuid, layer] of Object.entries(layers)) {
        const found = (layer.messages || []).some((m) => String(getShortChatId(m.id)) === target || String(m.id) === target);
        if (found) return layerUuid;
      }
      return null;
    }

    function navigateTopicSearchResult(index) {
      const result = topicSearchResults[index];
      if (!result) return;
      topicSearchIndex = index;
      renderTopicSearchResults();
      updateTopicSearchCount();
      const layerUuid = findLayerUuidForMessageId(result?.locator?.messageId);
      const focusMessageId = result?.locator?.messageId ? `tg:${result.locator.chatId}:${result.locator.messageId}` : null;
      if (layerUuid) {
        showLayer(layerUuid, focusMessageId);
      }
    }

    function moveTopicSearch(delta) {
      if (!topicSearchResults.length) return;
      const len = topicSearchResults.length;
      const next = (topicSearchIndex + delta + len) % len;
      navigateTopicSearchResult(next);
    }

    function setTopicsViewMode(mode) {
      topicsViewMode = (mode === 'archived') ? 'archived' : 'active';
      const a = document.getElementById('topics-tab-active');
      const b = document.getElementById('topics-tab-archived');
      const createBtn = document.getElementById('create-topic-btn');
      a.classList.toggle('active', topicsViewMode === 'active');
      b.classList.toggle('active', topicsViewMode === 'archived');
      createBtn.style.display = topicsViewMode === 'archived' ? 'none' : 'inline-block';
    }

    function markLayerWip(topicId, layerUuid, ttlMs = 30000) {
      if (!topicId || !layerUuid) return;
      const now = Date.now();
      const key = `${topicId}:${layerUuid}`;
      layerWipState.set(key, { topicId: String(topicId), layerUuid: String(layerUuid), startAt: now, untilAt: now + ttlMs });
      updateTopicWipUI();
    }

    function clearLayerWip(topicId, layerUuid) {
      if (!topicId || !layerUuid) return;
      layerWipState.delete(`${topicId}:${layerUuid}`);
      updateTopicWipUI();
    }

    function cleanupLayerWip() {
      const now = Date.now();
      let changed = false;
      for (const [k, v] of layerWipState.entries()) {
        if (!v || now > Number(v.untilAt || 0)) {
          layerWipState.delete(k);
          changed = true;
        }
      }
      if (changed) updateTopicWipUI();
    }

    function hasActiveWipForLayer(topicId, layerUuid) {
      const now = Date.now();
      const key = `${topicId}:${layerUuid}`;
      const v = layerWipState.get(key);
      return !!(v && now <= Number(v.untilAt || 0));
    }

    function updateTopicWipUI() {
      const rows = document.querySelectorAll('#tree .tree-node[data-layer-id]');
      rows.forEach((row) => {
        const layerUuid = String(row.getAttribute('data-layer-id') || '');
        const dots = row.querySelector('.wip-dots');
        if (!dots || !layerUuid || !currentChannel) return;
        const active = hasActiveWipForLayer(currentChannel, layerUuid);
        dots.classList.toggle('hidden', !active);
      });
    }

    function reconcileLayerWipFromView(topicId) {
      if (!topicId || !viewState?.state?.layers) return;
      for (const [k, w] of [...layerWipState.entries()]) {
        if (String(w.topicId) !== String(topicId)) continue;
        const layer = viewState.state.layers[w.layerUuid];
        if (!layer) continue;

        const hasBotReplyAfterStart = (layer.messages || []).some((m) =>
          m?.sender === 'bot' && Number(m.timestamp || 0) >= Number(w.startAt || 0)
        );
        if (hasBotReplyAfterStart) layerWipState.delete(k);
      }
      updateTopicWipUI();
    }

    function updateImagePreview() {
      const box = document.getElementById('image-preview');
      const img = document.getElementById('image-preview-img');
      if (!pendingImageDataUrl) {
        box.style.display = 'none';
        img.removeAttribute('src');
        return;
      }
      img.src = pendingImageDataUrl;
      box.style.display = 'flex';
    }

    function clearPendingImage() {
      pendingImageDataUrl = null;
      updateImagePreview();
    }

    function autoGrowComposerInput() {
      const input = document.getElementById('composer-input');
      if (!input) return;
      input.style.height = 'auto';
      const next = input.scrollHeight;
      input.style.height = `${Math.max(next, 44)}px`;
      input.style.overflowY = 'hidden';
    }

    function setReplyTarget(target) {
      replyTarget = target;
      const banner = document.getElementById('reply-banner');
      if (!replyTarget) {
        banner.style.display = 'none';
        banner.innerHTML = '';
        return;
      }
      banner.style.display = 'block';
      banner.innerHTML = `Replying to #${escapeHtml(String(getShortChatId(replyTarget.id)))} · ${escapeHtml(String(replyTarget.preview || ''))}<span class="close" id="reply-cancel">×</span>`;
      const cancel = document.getElementById('reply-cancel');
      if (cancel) cancel.onclick = () => setReplyTarget(null);
    }

    function openContextMenu(x, y, msgInfo) {
      contextTarget = msgInfo;
      const menu = document.getElementById('msg-context-menu');
      menu.style.display = 'block';
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
    }

    function closeContextMenu() {
      const menu = document.getElementById('msg-context-menu');
      menu.style.display = 'none';
      contextTarget = null;
    }

    function openTopicContextMenu(x, y, topicInfo) {
      topicContextTarget = topicInfo;
      const menu = document.getElementById('topic-context-menu');
      const hideBtn = document.getElementById('ctx-hide-topic-btn');
      const delBtn = document.getElementById('ctx-delete-topic-btn');
      hideBtn.textContent = topicInfo?.archived ? 'Unarchive Topic' : 'Archive Topic';
      delBtn.style.display = topicInfo?.deletedAt ? 'none' : 'block';
      menu.style.display = 'block';
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
    }

    function closeTopicContextMenu() {
      const menu = document.getElementById('topic-context-menu');
      menu.style.display = 'none';
      topicContextTarget = null;
    }

    function openLayerContextMenu(x, y, layerInfo) {
      layerContextTarget = layerInfo;
      const btn = document.getElementById('ctx-toggle-layer-done-btn');
      const done = !!layerDoneState.get(String(layerInfo.layerUuid))?.done;
      btn.textContent = done ? 'Mark undone' : 'Mark done';

      const menu = document.getElementById('layer-context-menu');
      menu.style.display = 'block';
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
    }

    function closeLayerContextMenu() {
      const menu = document.getElementById('layer-context-menu');
      menu.style.display = 'none';
      layerContextTarget = null;
    }

    async function loadLayerStatuses() {
      if (!currentSource || !currentChannel) return;
      const out = await api('GET', `/layers/status?source=${encodeURIComponent(currentSource)}&channel=${encodeURIComponent(currentChannel)}`);
      layerDoneState.clear();
      const layers = out?.layers || {};
      for (const [k, v] of Object.entries(layers)) {
        layerDoneState.set(String(k), { done: !!v?.done, updatedAt: Number(v?.updatedAt || 0) });
      }
    }

    function isLayerDone(layerUuid) {
      return !!layerDoneState.get(String(layerUuid))?.done;
    }

    async function setLayerDone(layerUuid, done) {
      const prev = layerDoneState.get(String(layerUuid)) || { done: false, updatedAt: 0 };
      layerDoneState.set(String(layerUuid), { done: !!done, updatedAt: Date.now() });
      if (viewState?.tree) renderTree(viewState.tree);
      showLayer(currentLayerUuid);
      try {
        const out = await api('POST', `/layers/${encodeURIComponent(layerUuid)}/done`, {
          source: currentSource,
          channel: currentChannel,
          done: !!done,
        });
        if (out?.error) throw new Error(out.error);
      } catch (e) {
        layerDoneState.set(String(layerUuid), prev);
        if (viewState?.tree) renderTree(viewState.tree);
        showLayer(currentLayerUuid);
        alert('Failed to update layer done status.');
      }
    }

    function openImageLightbox(src, alt = 'Expanded preview') {
      const root = document.getElementById('image-lightbox');
      const img = document.getElementById('image-lightbox-image');
      if (!root || !img || !src) return;
      lightboxImageSrc = src;
      img.src = src;
      img.alt = alt;
      root.classList.add('open');
      root.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeImageLightbox() {
      const root = document.getElementById('image-lightbox');
      const img = document.getElementById('image-lightbox-image');
      if (!root || !img) return;
      lightboxImageSrc = '';
      root.classList.remove('open');
      root.setAttribute('aria-hidden', 'true');
      img.removeAttribute('src');
      document.body.style.overflow = '';
    }

    async function refreshCurrentView() {
      if (realtimeRefreshPending) return;
      if (!currentSource || !currentChannel) return;
      realtimeRefreshPending = true;
      try {
        await loadView(currentSource, currentChannel);
      } catch (_) {
      } finally {
        realtimeRefreshPending = false;
      }
    }

    function stopRealtimeStream() {
      if (realtimeStream) {
        realtimeStream.close();
        realtimeStream = null;
      }
    }

    function startRealtimeStream() {
      stopRealtimeStream();
      if (!currentSource || !currentChannel) return;
      if (!window.EventSource) return;

      const url = `${appBasePath}/api/stream?source=${encodeURIComponent(currentSource)}&channel=${encodeURIComponent(currentChannel)}`;
      realtimeStream = new EventSource(url);
      realtimeStream.addEventListener('update', () => {
        if (document.hidden) return;
        refreshCurrentView();
      });
      realtimeStream.onerror = () => {
        // EventSource will auto-reconnect; keep handler to avoid uncaught noise.
      };
    }

    function getSelectedLayerAnchorReplyId() {
      const layer = viewState?.state?.layers?.[currentLayerUuid];
      if (!layer || !Array.isArray(layer.messages)) return Number(currentChannel);

      // Prefer replying to latest self message in the selected layer so replay
      // deterministically resolves back to this same layer.
      for (let i = layer.messages.length - 1; i >= 0; i--) {
        const m = layer.messages[i];
        if (m?.sender !== 'self') continue;
        const n = Number(getShortChatId(m.id));
        if (Number.isFinite(n)) return n;
      }

      // Fallback: topic anchor keeps the send in this forum topic.
      return Number(currentChannel);
    }

    async function sendCurrentMessage() {
      if (isSending) return;
      if (currentSource !== 'telegram' || !currentChannel) return;

      const input = document.getElementById('composer-input');
      const btn = document.getElementById('composer-send');
      const text = String(input.value || '').trim();
      const replyToId = replyTarget ? Number(getShortChatId(replyTarget.id)) : getSelectedLayerAnchorReplyId();
      if (!text && !pendingImageDataUrl) return;

      isSending = true;
      btn.disabled = true;

      try {
        let result;
        if (pendingImageDataUrl) {
          result = await api('POST', '/telegram/send-image', {
            dataUrl: pendingImageDataUrl,
            caption: text,
            replyToId,
          });
        } else {
          result = await api('POST', '/telegram/send', {
            text,
            replyToId,
          });
        }

        if (result && result.error) throw new Error(result.error);
        markLayerWip(currentChannel, currentLayerUuid);
        input.value = '';
        autoGrowComposerInput();
        clearPendingImage();
        setReplyTarget(null);
        await loadView(currentSource, currentChannel);
      } catch (e) {
        alert('Send failed. Please try again.');
      } finally {
        isSending = false;
        btn.disabled = false;
      }
    }

    async function loadSources() {
      const sources = await api('GET', '/sources');
      const sel = document.getElementById('source-select');
      sel.innerHTML = '<option value="">Select source...</option>';
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });

      if (sources.includes('telegram')) {
        currentSource = 'telegram';
        sel.value = 'telegram';
        await loadChannels('telegram');
      }
    }

    async function createTopicFromUI() {
      if (currentSource !== 'telegram') return;
      const title = window.prompt('New topic title');
      if (title === null) return;
      const trimmed = String(title).trim();
      if (!trimmed) return;

      const result = await api('POST', '/telegram/topics/create', { title: trimmed });
      if (result?.error) {
        alert(`Create topic failed: ${result.error}`);
        return;
      }

      if (result?.topicId) {
        pendingTopics.set(String(result.topicId), { name: trimmed, topicUUID: result.topicUUID || null });
      }

      await loadChannels('telegram');
      if (result?.topicId) {
        currentChannel = String(result.topicId);
        currentTopicName = trimmed;
        currentTopicChatId = result?.chatId ? String(result.chatId) : currentTopicChatId;
        currentTopicDeletedAt = null;
        updateComposerVisibility();
        await loadView(currentSource, currentChannel);
        startRealtimeStream();
      }
    }

    async function hideTopicFromUI(topicUUID, archived) {
      if (!topicUUID) return;
      const result = await api('POST', `/topics/${encodeURIComponent(topicUUID)}/archive`, { archived: !!archived });
      if (result?.error) {
        alert(`${archived ? 'Archive' : 'Unarchive'} topic failed: ${result.error}`);
        return;
      }
      if (archived && topicContextTarget && String(currentChannel) === String(topicContextTarget.id)) {
        currentChannel = '';
        currentTopicName = '';
        document.getElementById('messages').innerHTML = '<div id="empty-state">Select a topic to view messages</div>';
        updateComposerVisibility();
        stopRealtimeStream();
      }
      await loadChannels('telegram');
    }

    async function deleteTopicFromUI(topicUUID, topicId, topicName, chatId) {
      if (currentSource !== 'telegram') return;
      const ok = window.confirm(`Delete topic "${topicName}" on Telegram? KP will keep history as read-only.`);
      if (!ok) return;

      const result = await api('POST', `/topics/${encodeURIComponent(topicUUID)}/delete`, { chatId, topicId });
      if (result?.error) {
        alert(`Delete topic failed: ${result.error}`);
        return;
      }

      if (String(currentChannel) === String(topicId)) {
        currentTopicDeletedAt = Date.now();
        updateComposerVisibility();
      }

      await loadChannels('telegram');
      if (String(currentChannel) === String(topicId)) {
        await loadView(currentSource, currentChannel);
      }
    }

    async function loadChannels(source) {
      const topicList = document.getElementById('topic-list');
      const sel = document.getElementById('channel-select');
      topicList.style.display = 'block';
      topicList.innerHTML = '';
      sel.innerHTML = '';

      if (source === 'telegram') {
        const fetched = await api('GET', `/telegram/topics?includeArchived=true`);
        let topics = Array.isArray(fetched) ? [...fetched] : [];
        topics = topics.filter(t => topicsViewMode === 'archived' ? !!t.archived : !t.archived);

        // Merge locally-created topics that may not be ingested yet.
        for (const [id, t] of pendingTopics.entries()) {
          if (!topics.some(x => String(x.id) === String(id))) {
            topics.unshift({
              id: String(id),
              topicUUID: t.topicUUID || null,
              name: t.name,
              messageCount: 0,
              lastTimestamp: Date.now(),
              archived: false,
              deletedAt: null,
            });
          } else {
            pendingTopics.delete(String(id));
          }
        }

        topics.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.name || t.id;
          sel.appendChild(opt);

          const row = document.createElement('div');
          row.className = 'tree-node';
          row.setAttribute('data-topic-id', String(t.id));

          const label = document.createElement('span');
          label.className = 'topic-label';
          label.textContent = `${t.name} (${t.messageCount})${t.deletedAt ? ' [deleted]' : ''}`;
          row.appendChild(label);

          row.onclick = async () => {
            currentChannel = t.id;
            currentTopicName = t.name || '';
            currentTopicChatId = t.chatId ? String(t.chatId) : null;
            currentTopicDeletedAt = t.deletedAt || null;
            sel.value = t.id;
            updateComposerVisibility();
            await loadView(currentSource, currentChannel);
            startRealtimeStream();
          };

          row.oncontextmenu = (e) => {
            e.preventDefault();
            openTopicContextMenu(e.clientX, e.clientY, {
              id: t.id,
              chatId: t.chatId || null,
              name: t.name || t.id,
              topicUUID: t.topicUUID || null,
              archived: !!t.archived,
              deletedAt: t.deletedAt || null,
            });
          };
          topicList.appendChild(row);
        });
        updateTopicWipUI();
        return;
      }

      const channels = await api('GET', `/sources/${source}/channels`);
      channels.forEach(c => {
        const value = (typeof c === 'string') ? c : c.id;
        const label = (typeof c === 'string') ? c : (c.name || c.id);

        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label;
        sel.appendChild(opt);

        const row = document.createElement('div');
        row.className = 'tree-node';
        row.textContent = label;
        row.onclick = async () => {
          currentChannel = value;
          currentTopicName = label;
          sel.value = value;
          updateComposerVisibility();
          await loadView(currentSource, currentChannel);
        };
        topicList.appendChild(row);
      });
    }

    function topicStateKey(source, channel) {
      return `kp:lastLayer:${source}:${channel}`;
    }

    function getSavedLayer(source, channel) {
      try { return localStorage.getItem(topicStateKey(source, channel)); } catch (_) { return null; }
    }

    function saveCurrentLayer(source, channel, layerUuid) {
      try { localStorage.setItem(topicStateKey(source, channel), layerUuid); } catch (_) {}
    }

    function expandPathToLayer(layerUuid) {
      let cur = layerUuid;
      while (cur) {
        expandedNodes.add(cur);
        const p = viewState?.state?.layers?.[cur]?.parentLayerUuid || null;
        cur = p;
      }
      const rootId = viewState?.tree?.id || null;
      if (rootId) expandedNodes.add(rootId);
    }

    async function loadView(source, channel) {
      viewState = await api('GET', `/sources/${encodeURIComponent(source)}/channels/${encodeURIComponent(channel)}/view`);
      await loadLayerStatuses();
      const saved = getSavedLayer(source, channel);
      const exists = saved && viewState?.state?.layers?.[saved];
      currentLayerUuid = exists ? saved : viewState.currentLayerUuid;
      expandPathToLayer(currentLayerUuid);
      renderTree(viewState.tree);
      showLayer(currentLayerUuid);
      updateComposerVisibility();
      reconcileLayerWipFromView(channel);
      cleanupLayerWip();
    }

    function layerTitle(layerUuid) {
      if (layerUuid === viewState?.tree?.id && currentTopicName) return currentTopicName;
      const layer = viewState?.state?.layers?.[layerUuid];
      if (!layer || !layer.messages || layer.messages.length === 0) return `Layer ${layerUuid}`;

      const raw = String(layer.messages[0].content || '');
      const firstRow = raw.split(/\r?\n/).find(line => line.trim().length > 0) || '';
      const normalized = firstRow.replace(/\s+/g, ' ').trim();
      return normalized || `Layer ${layerUuid}`;
    }

    function renderTree(node, container) {
      if (!container) {
        container = document.getElementById('tree');
        container.innerHTML = '';
      }
      if (!node) return;

      const hasChildren = !!(node.children && node.children.length);
      const isExpanded = expandedNodes.has(node.id);

      const div = document.createElement('div');
      div.className = 'tree-node' + (node.id === currentLayerUuid ? ' active' : '');
      div.title = `${layerTitle(node.id)} (${node.messageCount} msgs)`;
      div.setAttribute('data-layer-id', String(node.id));

      const toggle = document.createElement('span');
      toggle.className = hasChildren ? 'tree-toggle' : 'tree-toggle placeholder';
      toggle.textContent = hasChildren ? (isExpanded ? '−' : '+') : '·';
      if (hasChildren) {
        toggle.onclick = (e) => {
          e.stopPropagation();
          if (expandedNodes.has(node.id)) expandedNodes.delete(node.id);
          else expandedNodes.add(node.id);
          renderTree(viewState.tree);
        };
      }

      const dots = document.createElement('span');
      dots.className = 'wip-dots hidden';
      dots.innerHTML = '<i></i><i></i><i></i>';

      const label = document.createElement('span');
      label.className = 'tree-label' + (isLayerDone(node.id) ? ' layer-done' : '');
      label.textContent = layerTitle(node.id);

      div.appendChild(toggle);
      div.appendChild(dots);
      div.appendChild(label);
      div.onclick = (e) => { e.stopPropagation(); showLayer(node.id); };
      div.oncontextmenu = (e) => {
        e.preventDefault();
        openLayerContextMenu(e.clientX, e.clientY, { layerUuid: node.id });
      };
      container.appendChild(div);

      if (hasChildren && isExpanded) {
        const childContainer = document.createElement('div');
        childContainer.className = 'tree-children';
        node.children.forEach(c => renderTree(c, childContainer));
        container.appendChild(childContainer);
      }
    }

    function mediaUrlFromPath(mediaPath) {
      const p = String(mediaPath || '').replace(/^\/+/, '');
      return p ? `${appBasePath}/media/${encodeURI(p)}` : null;
    }

    function showLayer(layerUuid, focusMessageId = null) {
      if (!viewState) return;
      currentLayerUuid = layerUuid;
      expandPathToLayer(layerUuid);
      saveCurrentLayer(currentSource, currentChannel, layerUuid);
      const layers = viewState.state.layers;
      const layer = layers[layerUuid];
      if (!layer) return;

      const headerTitle = document.getElementById('layer-header-title');
      const title = layerTitle(layerUuid);
      const titleHtml = isLayerDone(layerUuid)
        ? `<span class="tree-label layer-done">${escapeHtml(title)}</span>`
        : escapeHtml(title);
      if (layer.parentLayerUuid && layer.branchFromMessageId) {
        headerTitle.innerHTML = `${titleHtml} <a class="back-link" onclick="showLayer('${layer.parentLayerUuid}', '${layer.branchFromMessageId}')">↩ back to parent msg #${escapeHtml(getShortChatId(layer.branchFromMessageId))}</a>`;
      } else {
        headerTitle.innerHTML = titleHtml;
      }

      const msgDiv = document.getElementById('messages');
      msgDiv.innerHTML = '';

      if (layer.messages.length === 0) {
        msgDiv.innerHTML = '<div id="empty-state">No messages in this layer</div>';
        return;
      }

      // Find which messages have child branches
      const branchPoints = {};
      for (const child of (layer.children || [])) {
        if (!branchPoints[child.branchFromMessageId]) branchPoints[child.branchFromMessageId] = [];
        const childLayer = layers[child.layerUuid] || null;
        branchPoints[child.branchFromMessageId].push({
          layerUuid: child.layerUuid,
          firstMessageId: childLayer?.firstMessageId || null,
        });
      }

      layer.messages.forEach((m) => {
        const el = document.createElement('div');
        el.className = `msg ${m.sender}`;
        el.setAttribute('data-msg-id', m.id);
        el.setAttribute('data-msg-preview', String(m.content || '').replace(/\s+/g, ' ').trim().slice(0, 80));
        el.setAttribute('data-msg-sender', m.sender);
        let html = '';

        if (m.contentType === 'image' && m.mediaPath) {
          const mediaUrl = mediaUrlFromPath(m.mediaPath);
          if (mediaUrl) {
            html += `<img class="media-image" src="${escapeHtml(mediaUrl)}" alt="image ${escapeHtml(getShortChatId(m.id))}" loading="lazy" />`;
          }
          if (m.content && m.content !== '[media]') {
            html += `<div class="media-caption">${renderRichContent(m.content, m.entities)}</div>`;
          }
        } else {
          html += renderRichContent(m.content, m.entities);
        }

        html += `<div class="meta">${m.sender}`;
        if (m.replyToId) html += ` · reply to ${m.replyToId}`;
        if (branchPoints[m.id]) {
          branchPoints[m.id].forEach((child) => {
            const short = child.firstMessageId ? getShortChatId(child.firstMessageId) : child.layerUuid;
            html += `<span class="branch-badge" onclick="showLayer('${child.layerUuid}')">→ #${escapeHtml(String(short))}</span>`;
          });
        }
        html += '</div>';
        html += `<div class="chat-id">id: ${escapeHtml(getShortChatId(m.id))}</div>`;
        html += `<div class="time">${formatMessageTime(m.timestamp)}</div>`;
        el.innerHTML = html;
        msgDiv.appendChild(el);
      });

      // Re-render tree to update active highlight
      if (viewState.tree) renderTree(viewState.tree);

      if (focusMessageId) {
        const target = msgDiv.querySelector(`[data-msg-id="${focusMessageId}"]`);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.outline = '2px solid #4a6cf7';
          setTimeout(() => { target.style.outline = ''; }, 1200);
        }
      } else {
        requestAnimationFrame(() => {
          msgDiv.scrollTop = msgDiv.scrollHeight;
        });
      }
    }

    function getShortChatId(messageId) {
      if (!messageId) return '';
      const s = String(messageId);
      const idx = s.lastIndexOf(':');
      return idx >= 0 ? s.slice(idx + 1) : s;
    }

    function preprocessMessageForMarkdown(text) {
      const s = String(text || '');
      if (!s.trim() || s.includes('```')) return s;

      // Preserve Telegram-style unicode/ASCII charts in a fixed-width block.
      const chartLike = /[│┤┼╭╮╯╰╲─→]/.test(s) && /\n/.test(s);
      if (chartLike) return `\n\`\`\`text\n${s}\n\`\`\``;

      // No command-line heuristics: only style sections that are explicitly marked in content.
      return s;
    }

    function detectCodeLang(codeEl) {
      const cls = codeEl.className || '';
      const m = cls.match(/language-([a-z0-9_+-]+)/i);
      if (m) return m[1].toLowerCase();
      const txt = (codeEl.textContent || '').trim();
      if (/^(\$\s*)?(npm|pnpm|yarn|node|python|pip|git|docker|kubectl|curl|wget|cd|ls)\b/im.test(txt)) return 'shell';
      return 'text';
    }

    function enhanceCodeBlocks(html) {
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      wrap.querySelectorAll('pre > code').forEach((codeEl, idx) => {
        const pre = codeEl.parentElement;
        const lang = detectCodeLang(codeEl);
        const card = document.createElement('div');
        card.className = 'code-card';

        const header = document.createElement('div');
        header.className = 'code-header';
        header.innerHTML = `<span class="lang">${escapeHtml(lang)}</span><button class="copy-btn" data-copy-id="cb-${idx}">⧉</button>`;

        codeEl.setAttribute('data-copy-src', `cb-${idx}`);
        pre.parentNode.insertBefore(card, pre);
        card.appendChild(header);
        card.appendChild(pre);
      });
      return wrap.innerHTML;
    }

    function renderFromEntities(text, entities) {
      const s = String(text || '');
      const ents = (Array.isArray(entities) ? entities : [])
        .filter(e => Number.isFinite(e?.offset) && Number.isFinite(e?.length) && e.length > 0)
        .sort((a, b) => a.offset - b.offset);
      if (!ents.length) return null;

      const pieces = [];
      let i = 0;

      for (const e of ents) {
        const start = Math.max(0, Math.min(s.length, e.offset));
        const end = Math.max(start, Math.min(s.length, e.offset + e.length));
        if (start > i) pieces.push(escapeHtml(s.slice(i, start)));
        const chunk = s.slice(start, end);
        if (/MessageEntityPre$/.test(e.type || '')) {
          const lang = String(e.language || 'text').toLowerCase();
          pieces.push(`\n\n\`\`\`${lang}\n${chunk}\n\`\`\`\n\n`);
        } else {
          pieces.push(escapeHtml(chunk));
        }
        i = Math.max(i, end);
      }
      if (i < s.length) pieces.push(escapeHtml(s.slice(i)));

      // We introduced markdown fences for PRE ranges, so run through markdown renderer after reassembly.
      const merged = pieces.join('');
      const raw = md.render(merged);
      return enhanceCodeBlocks(DOMPurify.sanitize(raw));
    }

    function renderRichContent(text, entities = null) {
      try {
        const fromEntities = renderFromEntities(text, entities);
        if (fromEntities) return fromEntities;

        const pre = preprocessMessageForMarkdown(text);
        const raw = md.render(pre);
        const safe = DOMPurify.sanitize(raw);
        return enhanceCodeBlocks(safe);
      } catch (_) {
        return escapeHtml(String(text || ''));
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('messages').addEventListener('click', async (e) => {
      const image = e.target.closest('.media-image');
      if (image) {
        openImageLightbox(image.getAttribute('src'), image.getAttribute('alt') || 'Expanded preview');
        closeContextMenu();
        return;
      }

      const btn = e.target.closest('.copy-btn');
      if (!btn) {
        closeContextMenu();
        return;
      }
      const id = btn.getAttribute('data-copy-id');
      const src = document.querySelector(`code[data-copy-src="${id}"]`);
      if (!src) return;
      try {
        await navigator.clipboard.writeText(src.textContent || '');
        const old = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = old; }, 900);
      } catch (_) {}
    });

    document.getElementById('messages').addEventListener('contextmenu', (e) => {
      const msg = e.target.closest('.msg');
      if (!msg) return;
      e.preventDefault();
      const info = {
        id: msg.getAttribute('data-msg-id'),
        preview: msg.getAttribute('data-msg-preview') || '',
        sender: msg.getAttribute('data-msg-sender') || '',
      };
      openContextMenu(e.clientX, e.clientY, info);
    });

    document.getElementById('ctx-reply-btn').onclick = () => {
      if (contextTarget) setReplyTarget(contextTarget);
      closeContextMenu();
    };

    document.getElementById('ctx-hide-topic-btn').onclick = async () => {
      if (topicContextTarget?.topicUUID) {
        const nextArchived = !Boolean(topicContextTarget.archived);
        await hideTopicFromUI(topicContextTarget.topicUUID, nextArchived);
      }
      closeTopicContextMenu();
    };

    document.getElementById('ctx-delete-topic-btn').onclick = async () => {
      if (topicContextTarget?.topicUUID) {
        await deleteTopicFromUI(topicContextTarget.topicUUID, topicContextTarget.id, topicContextTarget.name, topicContextTarget.chatId);
      }
      closeTopicContextMenu();
    };

    document.getElementById('ctx-toggle-layer-done-btn').onclick = async () => {
      if (layerContextTarget?.layerUuid) {
        const id = String(layerContextTarget.layerUuid);
        const done = isLayerDone(id);
        await setLayerDone(id, !done);
      }
      closeLayerContextMenu();
    };

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#msg-context-menu')) closeContextMenu();
      if (!e.target.closest('#topic-context-menu')) closeTopicContextMenu();
      if (!e.target.closest('#layer-context-menu')) closeLayerContextMenu();
    });

    document.getElementById('topics-tab-active').onclick = async () => {
      setTopicsViewMode('active');
      if (currentSource === 'telegram') await loadChannels('telegram');
    };

    document.getElementById('topics-tab-archived').onclick = async () => {
      setTopicsViewMode('archived');
      if (currentSource === 'telegram') await loadChannels('telegram');
    };

    document.getElementById('image-lightbox-backdrop').addEventListener('click', closeImageLightbox);
    document.getElementById('image-lightbox-close').addEventListener('click', closeImageLightbox);

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && String(e.key).toLowerCase() === 'f') {
        e.preventDefault();
        const nextOpen = !topicSearchOpen;
        setTopicSearchOpen(nextOpen);
        if (nextOpen) {
          const input = document.getElementById('topic-search-input');
          input?.focus();
          input?.select();
        }
        return;
      }
      if (e.key === 'Escape') {
        if (lightboxImageSrc) {
          closeImageLightbox();
          return;
        }
        if (topicSearchOpen) {
          setTopicSearchOpen(false);
          return;
        }
      }
    });

    document.getElementById('source-select').onchange = async (e) => {
      currentSource = e.target.value;
      currentChannel = '';
      currentTopicName = '';
      currentTopicChatId = null;
      currentTopicDeletedAt = null;
      if (currentSource !== 'telegram') setTopicsViewMode('active');
      updateComposerVisibility();
      stopRealtimeStream();
      closeTopicContextMenu();
      if (currentSource) await loadChannels(currentSource);
    };

    document.getElementById('channel-select').onchange = async (e) => {
      currentChannel = e.target.value;
      const opt = e.target.selectedOptions && e.target.selectedOptions[0];
      currentTopicName = opt ? opt.textContent : '';
      currentTopicChatId = null;
      currentTopicDeletedAt = null;
      updateComposerVisibility();
      if (currentSource && currentChannel) {
        await loadView(currentSource, currentChannel);
        if (currentSource === 'telegram') startRealtimeStream();
      } else {
        stopRealtimeStream();
      }
    };

    document.getElementById('create-topic-btn').onclick = () => {
      createTopicFromUI().catch(() => {
        alert('Create topic failed. Please try again.');
      });
    };

    document.getElementById('topic-search-toggle').onclick = () => {
      setTopicSearchOpen(!topicSearchOpen);
      if (topicSearchOpen) {
        const input = document.getElementById('topic-search-input');
        input?.focus();
        input?.select();
      }
    };
    document.getElementById('topic-search-close').onclick = () => setTopicSearchOpen(false);
    document.getElementById('topic-search-prev').onclick = () => moveTopicSearch(-1);
    document.getElementById('topic-search-next').onclick = () => moveTopicSearch(1);
    document.getElementById('topic-search-input').addEventListener('input', (e) => {
      runTopicSearch(e.target.value, { navigate: false }).catch(() => {});
    });
    document.getElementById('topic-search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.shiftKey) {
        e.preventDefault();
        moveTopicSearch(-1);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (topicSearchIndex < 0 && topicSearchResults.length) navigateTopicSearchResult(0);
        else moveTopicSearch(1);
      }
    });

    document.getElementById('composer-send').onclick = sendCurrentMessage;
    document.getElementById('image-preview-remove').onclick = clearPendingImage;

    document.getElementById('composer-input').addEventListener('input', autoGrowComposerInput);
    document.getElementById('composer-input').addEventListener('paste', (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (!String(item.type || '').startsWith('image/')) continue;
        const file = item.getAsFile();
        if (!file) continue;
        const reader = new FileReader();
        reader.onload = () => {
          pendingImageDataUrl = String(reader.result || '');
          updateImagePreview();
        };
        reader.readAsDataURL(file);
        e.preventDefault();
        return;
      }
    });

    document.getElementById('composer-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendCurrentMessage();
      }
    });

    const splitter = document.getElementById('pane-splitter');
    splitter.addEventListener('mousedown', (e) => {
      e.preventDefault();
      isResizingSidebar = true;
      document.body.classList.add('resizing');
    });
    window.addEventListener('mousemove', (e) => {
      if (!isResizingSidebar) return;
      applySidebarWidth(e.clientX);
    });
    window.addEventListener('mouseup', () => {
      if (!isResizingSidebar) return;
      isResizingSidebar = false;
      document.body.classList.remove('resizing');
    });
    window.addEventListener('resize', () => {
      const current = parseInt(document.getElementById('sidebar').style.width || '280', 10);
      applySidebarWidth(current);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      refreshCurrentView();
    });

    window.addEventListener('beforeunload', () => {
      stopRealtimeStream();
    });

    restoreSidebarWidth();
    applyThemeByTime();
    setInterval(applyThemeByTime, 60 * 1000);
    setInterval(cleanupLayerWip, 1000);
    updateComposerVisibility();
    autoGrowComposerInput();
    loadSources();
  </script>
</body>
</html>
